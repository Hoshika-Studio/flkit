name: {{package_name}}
description: A Flutter starter generated by FLKit.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^17.1.0
  slang: 4.13.0
  slang_flutter: 4.13.0
  theme_tailor_annotation: ^3.1.3
  flutter_lucide: ^1.8.2
  {{#use_dio}}
  dio: ^5.9.2
  {{/use_dio}}
  {{#use_riverpod}}
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  {{/use_riverpod}}

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.12.2
  theme_tailor: ^3.1.3
  {{#use_riverpod}}
  riverpod_generator: ^4.0.0
  {{/use_riverpod}}

flutter:
  uses-material-design: true
